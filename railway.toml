[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py load_accidents && python manage.py collectstatic --noinput && gunicorn bikeostrava.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
healthcheckPath = "/"
healthcheckTimeout = 30
